# ============================================================
# Nginx 配置 — 备案等待期（仅本机访问）
# 用途：备案期间代码部署测试，绑定 127.0.0.1 不对外
# 位置：/etc/nginx/conf.d/class-pet-garden.conf
# ============================================================

server {
    listen 127.0.0.1:80;
    server_name 127.0.0.1;

    # 日志
    access_log /var/log/nginx/class-pet-garden-access.log;
    error_log  /var/log/nginx/class-pet-garden-error.log;

    # 前端静态文件
    root /home/ubuntu/class-pet-garden/client/dist;
    index index.html;

    # API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 文件上传大小限制
        client_max_body_size 10m;
    }

    # WebSocket 支持（宠物养成实时状态、竞赛对战）
    location /ws {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # SPA fallback — 所有非 API 请求返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 安全头
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
